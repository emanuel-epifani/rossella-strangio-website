<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100" height="100" style="margin: 0 auto; display: block;">
    <!-- Figura umana supportata -->
    <circle cx="45" cy="40" r="15" fill="white" stroke="#4682B4" stroke-width="2"/> <!-- Testa persona malata -->
    <path d="M45 55 L45 85" stroke="#4682B4" stroke-width="2"/> <!-- Corpo -->
    <path d="M45 65 L35 75" stroke="#4682B4" stroke-width="2"/> <!-- Braccio sx -->
    
    <!-- Figura di supporto -->
    <circle cx="75" cy="40" r="15" fill="white" stroke="#3CB371" stroke-width="2"/> <!-- Testa figura di supporto -->
    <path d="M75 55 L75 85" stroke="#3CB371" stroke-width="2"/> <!-- Corpo -->
    <path d="M75 65 L85 75" stroke="#3CB371" stroke-width="2"/> <!-- Braccio dx -->
    
    <!-- Mani che si incontrano/supporto -->
    <path d="M45 65 L60 70" stroke="#4682B4" stroke-width="2"/> <!-- Braccio dx persona malata -->
    <path d="M75 65 L60 70" stroke="#3CB371" stroke-width="2"/> <!-- Braccio sx figura di supporto -->
    <circle cx="60" cy="70" r="5" fill="white" stroke="#E98074" stroke-width="1.5"/> <!-- Mani che si incontrano -->
    
    <!-- Simbolo medico/salute -->
    <circle cx="20" cy="25" r="12" fill="none" stroke="#4682B4" stroke-width="2"/>
    <path d="M20 13 L20 37" stroke="#4682B4" stroke-width="2"/>
    <path d="M8 25 L32 25" stroke="#4682B4" stroke-width="2"/>
    
    <!-- Cuore che rappresenta la cura emotiva -->
    <path d="M100 30 C105 25 110 25 110 35 C110 45 100 50 95 55 C90 50 80 45 80 35 C80 25 85 25 90 30 C92 27 98 27 100 30" 
          fill="#E98074" stroke="#E98074" stroke-width="1"/>
    
    <!-- Simbolo di forza/resilienza - Sole che sorge -->
    <path d="M20 95 L100 95" stroke="#4682B4" stroke-width="2"/> <!-- Linea orizzontale di base -->
    <circle cx="60" cy="80" r="10" fill="#E98074"/> <!-- Sole -->
    <path d="M50 95 C60 85 80 85 90 95" fill="none" stroke="#3CB371" stroke-width="2"/> <!-- Arcobaleno/speranza -->
    
    <!-- Onde di energia curativa/supporto -->
    <path d="M50 15 C60 10 70 10 80 15" stroke="#3CB371" stroke-width="1.5" fill="none"/>
    <path d="M45 12 C60 5 80 5 95 12" stroke="#3CB371" stroke-width="1.5" fill="none"/>
    <path d="M40 9 C60 0 90 0 100 9" stroke="#3CB371" stroke-width="1.5" fill="none"/>
  </svg>