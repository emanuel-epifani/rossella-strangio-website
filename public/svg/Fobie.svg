<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100" height="100" style="margin: 0 auto; display: block;">
    <!-- Faccia con espressione di paura -->
    <circle cx="60" cy="60" r="35" fill="white" stroke="#4682B4" stroke-width="3"/>
    
    <!-- Occhi spalancati dalla paura -->
    <circle cx="48" cy="55" r="6" fill="#4682B4"/>
    <circle cx="72" cy="55" r="6" fill="#4682B4"/>
    
    <!-- Bocca aperta in grido -->
    <ellipse cx="60" cy="70" rx="10" ry="8" fill="#4682B4"/>
    
    <!-- Sopracciglia alzate in allarme -->
    <path d="M40 45 L55 40" stroke="#4682B4" stroke-width="3" fill="none"/>
    <path d="M65 40 L80 45" stroke="#4682B4" stroke-width="3" fill="none"/>
    
    <!-- Oggetti di fobia che circondano la persona -->
    <!-- Aereo (aerofobia) -->
    <path d="M15 25 L30 35 L45 30 L30 40 L15 35 Z" fill="#E0E0E0" stroke="#4682B4" stroke-width="1.5"/>
    
    <!-- Ragno (aracnofobia) -->
    <circle cx="90" cy="30" r="8" fill="#E0E0E0" stroke="#4682B4" stroke-width="1.5"/>
    <path d="M85 25 L80 20 M95 25 L100 20 M85 35 L80 40 M95 35 L100 40" stroke="#4682B4" stroke-width="1.5" fill="none"/>
    
    <!-- Altezza (acrofobia) - edificio alto -->
    <path d="M15 80 L15 100 L35 100 L35 80" fill="#E0E0E0" stroke="#4682B4" stroke-width="1.5"/>
    <path d="M18 85 L22 85 M28 85 L32 85 M18 95 L22 95 M28 95 L32 95" stroke="#4682B4" stroke-width="1"/>
    
    <!-- Ago/siringa (belonefobia) -->
    <path d="M85 80 L95 90 M95 90 L105 100" fill="none" stroke="#4682B4" stroke-width="1.5"/>
    <path d="M95 90 L85 100" fill="none" stroke="#4682B4" stroke-width="1.5"/>
    
    <!-- Fulmini/frecce di stress che puntano alla persona -->
    <path d="M60 15 L60 25 M30 30 L40 40 M90 30 L80 40 M105 60 L95 60 M15 60 L25 60" stroke="#E98074" stroke-width="2" stroke-linecap="round"/>
  </svg>