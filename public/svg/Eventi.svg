<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100" height="100" style="margin: 0 auto; display: block;">
    <!-- Figura umana stilizzata -->
    <circle cx="60" cy="48" r="18" fill="white" stroke="#4682B4" stroke-width="3"/> <!-- Testa -->
    
    <!-- Espressione di trauma -->
    <path d="M52 45 Q56 52 60 45" stroke="#4682B4" stroke-width="2" fill="none"/> <!-- Occhio sx chiuso/socchiuso -->
    <path d="M60 45 Q64 52 68 45" stroke="#4682B4" stroke-width="2" fill="none"/> <!-- Occhio dx chiuso/socchiuso -->
    <path d="M52 58 Q60 54 68 58" stroke="#4682B4" stroke-width="2" fill="none"/> <!-- Bocca triste -->
    
    <!-- Corpo stilizzato rannicchiato/protetto -->
    <path d="M60 66 Q60 80 60 90" stroke="#4682B4" stroke-width="3" fill="none"/>
    
    <!-- Braccia che abbracciano se stessi/protettive -->
    <path d="M60 75 Q45 70 45 80 Q45 90 60 90" stroke="#4682B4" stroke-width="3" fill="none"/>
    <path d="M60 75 Q75 70 75 80 Q75 90 60 90" stroke="#4682B4" stroke-width="3" fill="none"/>
    
    <!-- Crepa/ferita simbolica che rappresenta il trauma -->
    <path d="M43 38 L77 58" stroke="#E98074" stroke-width="2"/>
    <path d="M45 36 L47 40 M49 38 L51 42 M53 41 L55 45 M57 43 L59 47 M61 45 L63 49 M65 48 L67 52 M69 50 L71 54 M73 53 L75 57" 
          stroke="#E98074" stroke-width="1.5"/>
    
    <!-- Nuvola di ricordi traumatici -->
    <path d="M20 20 C15 25 15 35 20 40 C15 45 15 55 25 55 C30 65 45 60 45 50 C55 55 55 40 45 35 C50 25 35 15 20 20" 
          fill="#E0E0E0" stroke="#4682B4" stroke-width="1.5" opacity="0.7"/>
    
    <!-- Simboli di lampo/flash che rappresentano i flashback -->
    <path d="M25 30 L30 40 L25 40 L32 55" stroke="#E98074" stroke-width="2" fill="none"/>
    <path d="M35 25 L40 35 L35 35 L42 45" stroke="#E98074" stroke-width="2" fill="none"/>
    
    <!-- Onde concentriche rappresentanti l'impatto del trauma -->
    <circle cx="60" cy="60" r="50" fill="none" stroke="#4682B4" stroke-width="1" stroke-dasharray="2,3" opacity="0.5"/>
    <circle cx="60" cy="60" r="40" fill="none" stroke="#4682B4" stroke-width="1" stroke-dasharray="2,3" opacity="0.7"/>
  </svg>