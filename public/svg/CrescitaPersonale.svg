<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100" height="100" style="margin: 0 auto; display: block;">
    <!-- Figura umana in evoluzione/crescita -->
    <circle cx="40" cy="80" r="10" fill="white" stroke="#4682B4" stroke-width="2"/> <!-- Testa fase 1 -->
    <line x1="40" y1="90" x2="40" y2="105" stroke="#4682B4" stroke-width="2"/> <!-- Corpo fase 1 -->
    <line x1="40" y1="95" x2="30" y2="100" stroke="#4682B4" stroke-width="2"/> <!-- Braccio sx fase 1 -->
    <line x1="40" y1="95" x2="50" y2="100" stroke="#4682B4" stroke-width="2"/> <!-- Braccio dx fase 1 -->
    
    <circle cx="60" cy="60" r="12" fill="white" stroke="#4682B4" stroke-width="2"/> <!-- Testa fase 2 -->
    <line x1="60" y1="72" x2="60" y2="90" stroke="#4682B4" stroke-width="2"/> <!-- Corpo fase 2 -->
    <line x1="60" y1="78" x2="48" y2="85" stroke="#4682B4" stroke-width="2"/> <!-- Braccio sx fase 2 -->
    <line x1="60" y1="78" x2="72" y2="85" stroke="#4682B4" stroke-width="2"/> <!-- Braccio dx fase 2 -->
    
    <circle cx="80" cy="35" r="15" fill="white" stroke="#4682B4" stroke-width="2.5"/> <!-- Testa fase 3 -->
    <line x1="80" y1="50" x2="80" y2="75" stroke="#4682B4" stroke-width="2.5"/> <!-- Corpo fase 3 -->
    <path d="M80 55 C70 50 60 60 55 70" stroke="#4682B4" stroke-width="2.5" fill="none"/> <!-- Braccio sx fase 3 -->
    <path d="M80 55 C90 50 100 60 105 70" stroke="#4682B4" stroke-width="2.5" fill="none"/> <!-- Braccio dx fase 3 -->
    
    <!-- Scala ascendente -->
    <path d="M20 105 L100 25" stroke="#E0E0E0" stroke-width="4"/>
    <line x1="30" y1="95" x2="40" y2="85" stroke="#E0E0E0" stroke-width="2"/>
    <line x1="50" y1="75" x2="60" y2="65" stroke="#E0E0E0" stroke-width="2"/>
    <line x1="70" y1="55" x2="80" y2="45" stroke="#E0E0E0" stroke-width="2"/>
    
    <!-- Simboli di crescita/miglioramento -->
    <path d="M85 20 L90 15 L95 20" stroke="#E98074" stroke-width="2" fill="none"/> <!-- Freccia in su -->
    <path d="M90 15 L90 25" stroke="#E98074" stroke-width="2"/> <!-- Asta freccia -->
    
    <!-- Sole/illuminazione -->
    <circle cx="105" cy="15" r="8" fill="#E98074"/>
    <path d="M105 3 L105 7 M117 15 L113 15 M105 27 L105 23 M93 15 L97 15" stroke="#E98074" stroke-width="2"/>
    <path d="M97 7 L100 10 M113 7 L110 10 M113 23 L110 20 M97 23 L100 20" stroke="#E98074" stroke-width="1.5"/>
    
    <!-- Libro/conoscenza -->
    <path d="M25 30 L45 30 L45 45 L25 45 Z" fill="white" stroke="#4682B4" stroke-width="1.5"/>
    <path d="M25 30 Q35 35 45 30" stroke="#4682B4" stroke-width="1" fill="none"/>
    <path d="M25 35 L45 35" stroke="#4682B4" stroke-width="0.5"/>
    <path d="M25 40 L45 40" stroke="#4682B4" stroke-width="0.5"/>
  </svg>