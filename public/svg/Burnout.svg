<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100" height="100" style="margin: 0 auto; display: block;">
    <!-- Faccia esausta -->
    <circle cx="60" cy="60" r="35" fill="white" stroke="#4682B4" stroke-width="3"/>
    
    <!-- Occhi stanchi con occhiaie -->
    <path d="M45 55 Q50 58 55 55" stroke="#4682B4" stroke-width="2" fill="none"/>
    <path d="M43 60 L57 60" stroke="#4682B4" stroke-opacity="0.3" stroke-width="3"/>
    
    <path d="M65 55 Q70 58 75 55" stroke="#4682B4" stroke-width="2" fill="none"/>
    <path d="M63 60 L77 60" stroke="#4682B4" stroke-opacity="0.3" stroke-width="3"/>
    
    <!-- Bocca esausta -->
    <path d="M50 75 Q60 70 70 75" fill="none" stroke="#4682B4" stroke-width="2"/>
    
    <!-- Gocce di sudore -->
    <path d="M40 45 Q38 50 40 52" fill="#87CEFA" stroke="#4682B4"/>
    <path d="M80 45 Q82 50 80 52" fill="#87CEFA" stroke="#4682B4"/>
    
    <!-- Indicatore batteria scarica -->
    <rect x="85" y="50" width="24" height="12" fill="none" stroke="#E98074" stroke-width="2" rx="2"/>
    <rect x="109" y="54" width="3" height="4" fill="#E98074" stroke="#E98074" stroke-width="1"/>
    <rect x="87" y="52" width="5" height="8" fill="#E98074" stroke="none"/>
    
    <!-- Simboli di lavoro che "schiacciano" -->
    <rect x="15" y="30" width="15" height="15" fill="none" stroke="#4682B4" stroke-width="2"/> <!-- Documento -->
    <path d="M18 35 L27 35 M18 40 L27 40" stroke="#4682B4" stroke-width="1"/> <!-- Righe documento -->
    
    <rect x="12" y="50" width="18" height="12" fill="none" stroke="#4682B4" stroke-width="2" rx="1"/> <!-- Laptop -->
    <rect x="12" y="62" width="18" height="2" fill="#4682B4" stroke="none"/> <!-- Base laptop -->
    
    <circle cx="20" cy="80" r="10" fill="none" stroke="#4682B4" stroke-width="2"/> <!-- Orologio -->
    <path d="M20 80 L20 73 M20 80 L25 83" stroke="#4682B4" stroke-width="2"/> <!-- Lancette -->
    
    <!-- Frecce che puntano alla persona da tutti i lati (pressione) -->
    <path d="M60 10 L60 20" stroke="#E98074" stroke-width="2"/>
    <path d="M57 13 L60 10 L63 13" fill="#E98074"/>
    
    <path d="M60 110 L60 100" stroke="#E98074" stroke-width="2"/>
    <path d="M57 107 L60 110 L63 107" fill="#E98074"/>
    
    <path d="M110 60 L100 60" stroke="#E98074" stroke-width="2"/>
    <path d="M107 57 L110 60 L107 63" fill="#E98074"/>
    
    <path d="M10 60 L20 60" stroke="#E98074" stroke-width="2"/>
    <path d="M13 57 L10 60 L13 63" fill="#E98074"/>
  </svg>