<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100" height="100" style="margin: 0 auto; display: block;">
    <!-- Figura umana stilizzata con corpo alterato -->
    <circle cx="60" cy="30" r="15" fill="white" stroke="#4682B4" stroke-width="2.5"/> <!-- Testa -->
    
    <!-- Espressione preoccupata/triste -->
    <circle cx="54" cy="28" r="2" fill="#4682B4"/> <!-- Occhio sx -->
    <circle cx="66" cy="28" r="2" fill="#4682B4"/> <!-- Occhio dx -->
    <path d="M54 38 Q60 34 66 38" stroke="#4682B4" stroke-width="1.5" fill="none"/> <!-- Bocca triste -->
    
    <!-- Corpo distorto - visione alterata -->
    <path d="M60 45 L60 90" stroke="#4682B4" stroke-width="2"/> <!-- Corpo centrale -->
    
    <!-- Braccia sottili -->
    <path d="M60 55 L40 65" stroke="#4682B4" stroke-width="1.5"/>
    <path d="M60 55 L80 65" stroke="#4682B4" stroke-width="1.5"/>
    
    <!-- Gambe sottili -->
    <path d="M60 90 L50 110" stroke="#4682B4" stroke-width="1.5"/>
    <path d="M60 90 L70 110" stroke="#4682B4" stroke-width="1.5"/>
    
    <!-- Specchio che mostra immagine distorta -->
    <rect x="85" y="25" width="25" height="70" fill="none" stroke="#E98074" stroke-width="2" rx="2"/>
    <path d="M90 45 Q97 60 90 75" stroke="#E98074" stroke-width="3" fill="none"/> <!-- Corpo distorto nello specchio -->
    <circle cx="90" cy="35" r="5" fill="none" stroke="#E98074" stroke-width="1.5"/> <!-- Testa nel riflesso -->
    
    <!-- Bilancia -->
    <rect x="15" y="80" width="25" height="5" fill="#E0E0E0" stroke="#4682B4" stroke-width="2"/>
    <path d="M27.5 80 L27.5 75" stroke="#4682B4" stroke-width="2"/>
    <rect x="10" y="85" width="35" height="8" rx="2" fill="#E0E0E0" stroke="#4682B4" stroke-width="1.5"/>
    
    <!-- Cibo -->
    <circle cx="20" cy="40" r="10" fill="none" stroke="#4682B4" stroke-width="2" stroke-dasharray="3,3"/>
    <line x1="13" y1="40" x2="27" y2="40" stroke="#E98074" stroke-width="2"/>
    
    <!-- Pensieri conflittuali sul cibo -->
    <path d="M45 20 C40 15 35 20 35 25 C30 25 30 35 35 35 C35 40 45 40 45 35 C50 35 50 25 45 25 C45 20 40 15 35 20" fill="#E0E0E0" stroke="#4682B4" stroke-width="1"/>
    <text x="39" y="30" font-family="Arial" font-size="10" fill="#E98074" text-anchor="middle">?</text>
  </svg>