<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100" height="100" style="margin: 0 auto; display: block;">
    <!-- Cerchio esterno che rappresenta il ciclo ossessivo-compulsivo -->
    <circle cx="60" cy="60" r="50" fill="none" stroke="#4682B4" stroke-width="3" stroke-dasharray="5,3"/>
    
    <!-- Faccia preoccupata -->
    <circle cx="60" cy="60" r="30" fill="white" stroke="#4682B4" stroke-width="2"/>
    <circle cx="50" cy="55" r="4" fill="#4682B4"/> <!-- Occhio sinistro -->
    <circle cx="70" cy="55" r="4" fill="#4682B4"/> <!-- Occhio destro -->
    <path d="M50 70 Q60 65 70 70" fill="none" stroke="#4682B4" stroke-width="2"/> <!-- Bocca preoccupata -->
    
    <!-- Frecce circolari che rappresentano i pensieri e comportamenti ripetitivi -->
    <path d="M60 20 A40 40 0 0 1 100 60" fill="none" stroke="#E98074" stroke-width="3" stroke-linecap="round"/>
    <path d="M100 60 A40 40 0 0 1 60 100" fill="none" stroke="#E98074" stroke-width="3" stroke-linecap="round"/>
    <path d="M60 100 A40 40 0 0 1 20 60" fill="none" stroke="#E98074" stroke-width="3" stroke-linecap="round"/>
    <path d="M20 60 A40 40 0 0 1 60 20" fill="none" stroke="#E98074" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Punte di freccia direzionali -->
    <path d="M95 50 L100 60 L90 55" fill="#E98074" stroke="#E98074"/>
    <path d="M70 95 L60 100 L65 90" fill="#E98074" stroke="#E98074"/>
    <path d="M25 70 L20 60 L30 65" fill="#E98074" stroke="#E98074"/>
    <path d="M50 25 L60 20 L55 30" fill="#E98074" stroke="#E98074"/>
    
    <!-- Simboli che rappresentano ossessioni comuni: controllo, pulizia -->
    <path d="M38 38 L42 42" stroke="#4682B4" stroke-width="2"/>
    <path d="M38 42 L42 38" stroke="#4682B4" stroke-width="2"/> 
    
    <circle cx="78" cy="78" r="5" fill="none" stroke="#4682B4" stroke-width="2"/>
    <path d="M75 75 L81 81" stroke="#4682B4" stroke-width="2"/>
  </svg>