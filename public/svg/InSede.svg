<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150" width="200" height="150">
    <!-- Sfondo -->
    <rect width="200" height="150" fill="#f2f2f2" rx="5" ry="5"/>
    
    <!-- Pavimento -->
    <rect x="0" y="100" width="200" height="50" fill="#E0E0E0" />
    
    <!-- Pareti -->
    <rect x="0" y="0" width="200" height="100" fill="#f9f9f9" />
    
    <!-- Finestra grande e chiara -->
    <rect x="120" y="10" width="70" height="60" fill="#E6F3FF" stroke="#4682B4" stroke-width="2"/>
    <line x1="155" y1="10" x2="155" y2="70" stroke="#4682B4" stroke-width="1.5"/>
    <line x1="120" y1="40" x2="190" y2="40" stroke="#4682B4" stroke-width="1.5"/>
    
    <!-- Tenda leggera alla finestra -->
    <path d="M120 10 C125 20, 125 30, 120 40" stroke="#E6F3FF" stroke-width="2" fill="none"/>
    <path d="M190 10 C185 20, 185 30, 190 40" stroke="#E6F3FF" stroke-width="2" fill="none"/>
    
    <!-- Tappeto rotondo sotto l'area di conversazione -->
    <ellipse cx="100" cy="125" rx="65" ry="20" fill="#C8D9EB" fill-opacity="0.3" stroke="#4682B4" stroke-width="1" stroke-dasharray="2,2"/>
    
    <!-- Figura terapeuta - più grande e chiara -->
    <circle cx="50" cy="70" r="12" fill="white" stroke="#4682B4" stroke-width="2"/> <!-- Testa -->
    <rect x="47" y="65" width="2.5" height="2" fill="#4682B4"/> <!-- Occhio sx -->
    <rect x="53" y="65" width="2.5" height="2" fill="#4682B4"/> <!-- Occhio dx -->
    <path d="M48 71 C50 73, 53 73, 55 71" stroke="#4682B4" stroke-width="1" fill="none"/> <!-- Sorriso -->
    
    <!-- Nessun capello per il terapeuta -->
    
    <path d="M50 82 L50 110" stroke="#4682B4" stroke-width="2"/> <!-- Corpo -->
    <path d="M50 90 L35 100" stroke="#4682B4" stroke-width="2"/> <!-- Braccio sx -->
    <path d="M50 90 L65 100" stroke="#4682B4" stroke-width="2"/> <!-- Braccio dx -->
    <path d="M50 110 L40 130" stroke="#4682B4" stroke-width="2"/> <!-- Gamba sx -->
    <path d="M50 110 L60 130" stroke="#4682B4" stroke-width="2"/> <!-- Gamba dx -->
    
    <!-- Poltrona terapeuta -->
    <rect x="30" y="115" width="40" height="25" rx="5" ry="5" fill="#C8D9EB" stroke="#4682B4" stroke-width="2"/>
    
    <!-- Dettagli poltrona terapeuta -->
    <line x1="35" y1="115" x2="35" y2="140" stroke="#4682B4" stroke-width="1"/>
    <line x1="65" y1="115" x2="65" y2="140" stroke="#4682B4" stroke-width="1"/>
    <path d="M30 125 L70 125" stroke="#4682B4" stroke-width="1"/>
    
    <!-- Figura paziente - più grande e chiara -->
    <circle cx="150" cy="70" r="12" fill="white" stroke="#4682B4" stroke-width="2"/> <!-- Testa -->
    <rect x="147" y="65" width="2.5" height="2" fill="#4682B4"/> <!-- Occhio sx -->
    <rect x="153" y="65" width="2.5" height="2" fill="#4682B4"/> <!-- Occhio dx -->
    <path d="M147 72 C149 70, 152 70, 154 72" stroke="#4682B4" stroke-width="1" fill="none"/> <!-- Espressione neutra -->
    
    <!-- Nessun capello per il paziente -->
    
    <path d="M150 82 L150 110" stroke="#4682B4" stroke-width="2"/> <!-- Corpo -->
    <path d="M150 90 L135 100" stroke="#4682B4" stroke-width="2"/> <!-- Braccio sx -->
    <path d="M150 90 L165 100" stroke="#4682B4" stroke-width="2"/> <!-- Braccio dx -->
    <path d="M150 110 L140 130" stroke="#4682B4" stroke-width="2"/> <!-- Gamba sx -->
    <path d="M150 110 L160 130" stroke="#4682B4" stroke-width="2"/> <!-- Gamba dx -->
    
    <!-- Poltrona paziente -->
    <rect x="130" y="115" width="40" height="25" rx="5" ry="5" fill="#C8D9EB" stroke="#4682B4" stroke-width="2"/>
    
    <!-- Dettagli poltrona paziente -->
    <line x1="135" y1="115" x2="135" y2="140" stroke="#4682B4" stroke-width="1"/>
    <line x1="165" y1="115" x2="165" y2="140" stroke="#4682B4" stroke-width="1"/>
    <path d="M130 125 L170 125" stroke="#4682B4" stroke-width="1"/>
    
    <!-- Tavolino tra le poltrone -->
    <rect x="85" y="120" width="30" height="5" fill="#D6C6B8" stroke="#4682B4" stroke-width="2"/>
    <line x1="90" y1="125" x2="90" y2="135" stroke="#4682B4" stroke-width="2"/> <!-- Gamba sx -->
    <line x1="110" y1="125" x2="110" y2="135" stroke="#4682B4" stroke-width="2"/> <!-- Gamba dx -->
    
    <!-- Tazza sul tavolino -->
    <path d="M95 115 L105 115 L103 120 L97 120 Z" fill="white" stroke="#4682B4" stroke-width="1"/>
    <path d="M105 118 L107 118 L107 116 L105 116" stroke="#4682B4" stroke-width="1" fill="none"/> <!-- Manico -->
    
    <!-- Blocco note sul tavolino -->
    <rect x="95" y="110" width="10" height="8" fill="white" stroke="#4682B4" stroke-width="1"/>
    <line x1="97" y1="112" x2="103" y2="112" stroke="#4682B4" stroke-width="0.5"/>
    <line x1="97" y1="114" x2="103" y2="114" stroke="#4682B4" stroke-width="0.5"/>
    <line x1="97" y1="116" x2="100" y2="116" stroke="#4682B4" stroke-width="0.5"/>
    
    <!-- Libreria semplificata e chiara -->
    <rect x="10" y="10" width="30" height="80" fill="#D6C6B8" stroke="#4682B4" stroke-width="2"/>
    <line x1="10" y1="30" x2="40" y2="30" stroke="#4682B4" stroke-width="1.5"/>
    <line x1="10" y1="50" x2="40" y2="50" stroke="#4682B4" stroke-width="1.5"/>
    <line x1="10" y1="70" x2="40" y2="70" stroke="#4682B4" stroke-width="1.5"/>
    
    <!-- Libri nella libreria - più grandi e visibili -->
    <rect x="12" y="12" width="5" height="15" fill="#4682B4"/>
    <rect x="18" y="14" width="5" height="13" fill="#E98074"/>
    <rect x="24" y="12" width="5" height="15" fill="#4682B4"/>
    <rect x="30" y="15" width="5" height="12" fill="#E98074"/>
    
    <rect x="15" y="32" width="5" height="15" fill="#E98074"/>
    <rect x="21" y="34" width="5" height="13" fill="#4682B4"/>
    <rect x="27" y="32" width="5" height="15" fill="#E98074"/>
    
    <rect x="13" y="52" width="5" height="15" fill="#4682B4"/>
    <rect x="19" y="54" width="5" height="13" fill="#E98074"/>
    <rect x="25" y="52" width="5" height="15" fill="#4682B4"/>
    <rect x="31" y="55" width="5" height="12" fill="#E98074"/>
    
    <!-- Quadro sulla parete -->
    <rect x="60" y="20" width="40" height="30" fill="white" stroke="#4682B4" stroke-width="2"/>
    <path d="M70 35 C75 25, 85 40, 90 30" stroke="#E98074" stroke-width="2" fill="none"/>
    
    <!-- Scritta "STUDIO DI PSICOTERAPIA" -->
    <rect x="55" y="5" width="90" height="10" fill="white" stroke="#4682B4" stroke-width="1"/>
    <text x="100" y="13" font-family="Arial, sans-serif" font-size="7" text-anchor="middle" fill="#4682B4">STUDIO DI PSICOTERAPIA</text>
    
    <!-- Simbolo psi rimosso -->
    
    <!-- Orologio sulla parete -->
    <circle cx="175" cy="85" r="8" fill="white" stroke="#4682B4" stroke-width="1.5"/>
    <line x1="175" y1="85" x2="175" y2="80" stroke="#4682B4" stroke-width="1"/>
    <line x1="175" y1="85" x2="179" y2="87" stroke="#4682B4" stroke-width="1"/>
    
    <!-- Diploma sulla parete -->
    <rect x="25" y="90" width="18" height="12" fill="white" stroke="#4682B4" stroke-width="1"/>
    <path d="M28 93 L40 93" stroke="#4682B4" stroke-width="0.5"/>
    <path d="M28 96 L40 96" stroke="#4682B4" stroke-width="0.5"/>
    <path d="M28 99 L40 99" stroke="#4682B4" stroke-width="0.5"/>
    
    <!-- Pianta decorativa nell'angolo -->
    <rect x="175" y="110" width="10" height="10" fill="#D6C6B8" stroke="#4682B4" stroke-width="1"/>
    <path d="M180 110 L180 100" stroke="#4682B4" stroke-width="1"/>
    <path d="M180 100 C175 95, 170 97, 173 102" stroke="#E98074" stroke-width="1" fill="none"/>
    <path d="M180 100 C185 95, 190 97, 187 102" stroke="#E98074" stroke-width="1" fill="none"/>
    <path d="M180 105 C177 100, 173 102, 176 107" stroke="#E98074" stroke-width="1" fill="none"/>
    <path d="M180 105 C183 100, 187 102, 184 107" stroke="#E98074" stroke-width="1" fill="none"/>
    
    <!-- Lampada da terra -->
    <rect x="15" y="90" width="4" height="20" fill="#D6C6B8" stroke="#4682B4" stroke-width="1"/>
    <path d="M17 90 L17 85" stroke="#D6C6B8" stroke-width="1"/>
    <path d="M12 85 L22 85 L17 75 Z" fill="#FFFCE6" stroke="#4682B4" stroke-width="1"/>
    
    <!-- Dettagli pavimento - linee dei pavimenti in legno -->
    <line x1="0" y1="110" x2="200" y2="110" stroke="#D6C6B8" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="200" y2="120" stroke="#D6C6B8" stroke-width="0.5"/>
    <line x1="0" y1="130" x2="200" y2="130" stroke="#D6C6B8" stroke-width="0.5"/>
    <line x1="0" y1="140" x2="200" y2="140" stroke="#D6C6B8" stroke-width="0.5"/>
</svg>