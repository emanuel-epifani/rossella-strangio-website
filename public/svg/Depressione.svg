<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100" height="100">
    <!-- Sfondo chiaro per l'ambiente depresso -->
    <rect x="10" y="10" width="100" height="100" rx="50" ry="50" fill="#F8F8F8" stroke="#4682B4" stroke-width="1" stroke-dasharray="2,2"/>
    
    <!-- Faccia dell'emoticon con espressione depressa -->
    <circle cx="60" cy="55" r="32" fill="white" stroke="#4682B4" stroke-width="3"/>
    
    <!-- Occhi stanchi/abbassati -->
    <path d="M45 55 L55 55" stroke="#4682B4" stroke-width="2.5"/>
    <path d="M65 55 L75 55" stroke="#4682B4" stroke-width="2.5"/>
    
    <!-- Occhiaie/ombreggiatura sotto gli occhi -->
    <path d="M43 60 C50 63 58 63 57 60" stroke="#4682B4" stroke-opacity="0.3" stroke-width="3"/>
    <path d="M63 60 C70 63 78 63 77 60" stroke="#4682B4" stroke-opacity="0.3" stroke-width="3"/>
    
    <!-- Bocca triste -->
    <path d="M45 75 Q60 65 75 75" fill="none" stroke="#4682B4" stroke-width="3"/>
    
    <!-- Nuvola di pioggia/tristezza -->
    <path d="M25 25 C20 25 15 30 20 35 C10 35 10 45 20 45 C20 50 35 50 35 45 C45 50 45 35 35 35 C40 25 30 20 25 25" 
          fill="#E0E0E0" stroke="#4682B4" stroke-width="1.5"/>
    
    <!-- Gocce di pioggia -->
    <path d="M23 45 L23 55" stroke="#87CEFA" stroke-width="1.5"/>
    <path d="M30 45 L30 60" stroke="#87CEFA" stroke-width="1.5"/>
    <path d="M37 45 L37 55" stroke="#87CEFA" stroke-width="1.5"/>
    
    <!-- Lacrime -->
    <path d="M50 55 Q48 60 50 65" fill="#87CEFA" stroke="#4682B4" stroke-width="0.5"/>
    
    <!-- Peso/zavorra che rappresenta il "peso" della depressione -->
    <rect x="35" y="95" width="50" height="10" rx="2" fill="#E0E0E0" stroke="#4682B4" stroke-width="2"/>
    <line x1="60" y1="87" x2="60" y2="95" stroke="#4682B4" stroke-width="2.5"/>
    
    <!-- Catena che collega la persona alla zavorra -->
    <line x1="60" y1="87" x2="60" y2="95" stroke="#4682B4" stroke-width="2.5"/>
    <path d="M60 87 L60 79" stroke="#4682B4" stroke-width="2" stroke-dasharray="3,2"/>
    
    <!-- Spirale discendente che rappresenta i pensieri negativi -->
    <path d="M90 35 C100 35 100 45 90 45 C80 45 80 55 90 55 C100 55 100 65 90 65" 
          fill="none" stroke="#E98074" stroke-width="2" stroke-dasharray="2,1"/>
    
    <!-- Freccia verso il basso (simbolo di energia/umore basso) -->
    <path d="M90 70 L90 80" stroke="#E98074" stroke-width="2"/>
    <path d="M85 75 L90 80 L95 75" fill="#E98074"/>
</svg>