<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100" height="100" style="margin: 0 auto; display: block;">
    <!-- Figura umana stilizzata -->
    <circle cx="60" cy="45" r="15" fill="white" stroke="#4682B4" stroke-width="2.5"/> <!-- Testa -->
    
    <!-- Espressione di frustrazione/insoddisfazione -->
    <circle cx="54" cy="42" r="2" fill="#4682B4"/> <!-- Occhio sx -->
    <circle cx="66" cy="42" r="2" fill="#4682B4"/> <!-- Occhio dx -->
    <path d="M54 50 Q60 48 66 50" stroke="#4682B4" stroke-width="1.5" fill="none"/> <!-- Bocca insoddisfatta -->
    
    <!-- Corpo stilizzato -->
    <line x1="60" y1="60" x2="60" y2="80" stroke="#4682B4" stroke-width="2.5"/>
    
    <!-- Braccia -->
    <line x1="40" y1="65" x2="60" y2="60" stroke="#4682B4" stroke-width="2.5"/>
    <line x1="80" y1="65" x2="60" y2="60" stroke="#4682B4" stroke-width="2.5"/>
    
    <!-- Gambe -->
    <line x1="60" y1="80" x2="50" y2="100" stroke="#4682B4" stroke-width="2.5"/>
    <line x1="60" y1="80" x2="70" y2="100" stroke="#4682B4" stroke-width="2.5"/>
    
    <!-- Blocchi che circondano e impediscono il movimento -->
    <rect x="30" y="70" width="15" height="15" fill="#E0E0E0" stroke="#E98074" stroke-width="2"/>
    <rect x="75" y="70" width="15" height="15" fill="#E0E0E0" stroke="#E98074" stroke-width="2"/>
    <rect x="45" y="90" width="30" height="15" fill="#E0E0E0" stroke="#E98074" stroke-width="2"/>
    
    <!-- Muro/barriera che rappresenta l'ostacolo -->
    <path d="M20 20 L20 100 L30 100 L30 20" fill="#E0E0E0" stroke="#E98074" stroke-width="2"/>
    <path d="M90 20 L90 100 L100 100 L100 20" fill="#E0E0E0" stroke="#E98074" stroke-width="2"/>
    
    <!-- Catena che rappresenta i vincoli percepiti -->
    <path d="M30 45 Q45 35 60 45 Q75 55 90 45" fill="none" stroke="#4682B4" stroke-width="1.5" stroke-dasharray="3,3"/>
    
    <!-- Punto interrogativo che rappresenta la confusione/incertezza -->
    <text x="85" y="35" font-family="Arial" font-size="14" font-weight="bold" fill="#E98074">?</text>
  </svg>