<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100" height="100">
    <!-- Sfondo circolare -->
    <circle cx="60" cy="60" r="55" fill="none" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="3,2"/>
    
    <!-- Figura umana - faccia più emaciata -->
    <ellipse cx="60" cy="45" rx="18" ry="20" fill="white" stroke="#4682B4" stroke-width="2"/> <!-- Testa ovale più magra -->
    
    <!-- Espressione di tossicodipendente -->
    <!-- Occhi incavati con occhiaie -->
    <circle cx="52" cy="42" r="2.5" fill="#4682B4"/> <!-- Occhio sx -->
    <path d="M48 44 C50 48 54 48 56 44" stroke="#4682B4" stroke-opacity="0.5" stroke-width="2.5" fill="none"/> <!-- Occhiaia sx -->
    
    <circle cx="68" cy="42" r="2.5" fill="#4682B4"/> <!-- Occhio dx -->
    <path d="M64 44 C66 48 70 48 72 44" stroke="#4682B4" stroke-opacity="0.5" stroke-width="2.5" fill="none"/> <!-- Occhiaia dx -->
    
    <!-- Bocca che mostra sofferenza/desiderio -->
    <path d="M52 55 Q60 51 68 55" stroke="#4682B4" stroke-width="1.5" fill="none"/>
    
    <!-- Sopracciglia tese verso il basso - aspetto preoccupato/disperato -->
    <path d="M47 37 L57 39" stroke="#4682B4" stroke-width="1.5"/>
    <path d="M63 39 L73 37" stroke="#4682B4" stroke-width="1.5"/>
    
    <!-- Corpo emaciato -->
    <path d="M60 65 L60 95" stroke="#4682B4" stroke-width="1.5"/> <!-- Corpo più sottile -->
    
    <!-- Braccia scheletriche che tremano -->
    <path d="M60 70 Q45 72 38 78" stroke="#4682B4" stroke-width="1.5" fill="none"/> <!-- Braccio sx tremante -->
    <path d="M38 78 Q36 80 35 78 Q34 76 33 78" stroke="#4682B4" stroke-width="1" fill="none"/> <!-- Mano tremante -->
    
    <path d="M60 70 Q75 72 82 78" stroke="#4682B4" stroke-width="1.5" fill="none"/> <!-- Braccio dx tremante -->
    <path d="M82 78 Q84 80 85 78 Q86 76 87 78" stroke="#4682B4" stroke-width="1" fill="none"/> <!-- Mano tremante -->
    
    <!-- Segni di punture sul braccio -->
    <circle cx="45" cy="75" r="1" fill="#E98074"/>
    <circle cx="43" cy="73" r="1" fill="#E98074"/>
    <circle cx="47" cy="73" r="1" fill="#E98074"/>
    <circle cx="75" cy="75" r="1" fill="#E98074"/>
    <circle cx="77" cy="73" r="1" fill="#E98074"/>
    
    <!-- Gocce di sudore -->
    <path d="M45 35 Q43 38 45 40" fill="#87CEFA" stroke="#4682B4" stroke-width="0.5"/>
    <path d="M75 35 Q77 38 75 40" fill="#87CEFA" stroke="#4682B4" stroke-width="0.5"/>
    
    <!-- Capelli arruffati -->
    <path d="M45 30 Q46 25 50 28" stroke="#4682B4" stroke-width="1" fill="none"/>
    <path d="M50 28 Q55 24 60 27" stroke="#4682B4" stroke-width="1" fill="none"/>
    <path d="M60 27 Q65 24 70 28" stroke="#4682B4" stroke-width="1" fill="none"/>
    <path d="M70 28 Q74 25 75 30" stroke="#4682B4" stroke-width="1" fill="none"/>
    
    <!-- Ciclo di dipendenza rappresentato come frecce circolari -->
    <path d="M60 15 A30 30 0 0 1 90 45" fill="none" stroke="#E98074" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="2,1"/>
    <path d="M90 45 A30 30 0 0 1 60 75" fill="none" stroke="#E98074" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="2,1"/>
    <path d="M60 75 A30 30 0 0 1 30 45" fill="none" stroke="#E98074" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="2,1"/>
    <path d="M30 45 A30 30 0 0 1 60 15" fill="none" stroke="#E98074" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="2,1"/>
    
    <!-- OGGETTI DI DIPENDENZA -->
    
    <!-- 1. Siringa con liquido -->
    <rect x="15" y="80" width="3" height="15" fill="white" stroke="#4682B4" stroke-width="1"/>
    <path d="M10 80 L23 80" stroke="#4682B4" stroke-width="1.5"/>
    <path d="M16.5 80 L16.5 70" stroke="#4682B4" stroke-width="1.5"/>
    <ellipse cx="16.5" cy="67" rx="2" ry="1" fill="white" stroke="#4682B4" stroke-width="1"/>
    <!-- Liquido nella siringa -->
    <rect x="15.5" y="80" width="2" height="10" fill="#E98074" fill-opacity="0.5"/>
    
    <!-- 2. Polvere/sostanza con strumento per sniffare -->
    <path d="M85 95 Q95 90 105 95" fill="none" stroke="#4682B4" stroke-width="0.5"/>
    <path d="M85 93 L105 93" stroke="#FFFFFF" stroke-width="2"/>
    <path d="M90 90 L100 90" stroke="#FFFFFF" stroke-width="2"/>
    <!-- Strumento per sniffare -->
    <path d="M95 90 L95 85" stroke="#4682B4" stroke-width="1"/>
    <path d="M95 85 L98 82" stroke="#4682B4" stroke-width="1"/>
    
    <!-- 3. Pillole sparse -->
    <ellipse cx="45" cy="100" rx="4" ry="2.5" fill="white" stroke="#4682B4" stroke-width="1"/>
    <ellipse cx="55" cy="105" rx="4" ry="2.5" fill="white" stroke="#4682B4" stroke-width="1"/>
    <ellipse cx="65" cy="100" rx="4" ry="2.5" fill="white" stroke="#4682B4" stroke-width="1"/>
    
    <!-- Simboli di avvertimento/pericolo -->
    <path d="M15 45 L25 35 L35 45 L15 45" fill="none" stroke="#E98074" stroke-width="1.5"/>
    <text x="25" y="43" font-family="Arial" font-size="9" fill="#E98074" text-anchor="middle" font-weight="bold">!</text>
    
    <path d="M85 35 L95 25 L105 35 L85 35" fill="none" stroke="#E98074" stroke-width="1.5"/>
    <text x="95" y="33" font-family="Arial" font-size="9" fill="#E98074" text-anchor="middle" font-weight="bold">!</text>
    
    <!-- Tremori che indicano il malessere fisico/crisi di astinenza -->
    <path d="M50 110 Q53 108 56 110 Q59 112 62 110" stroke="#4682B4" stroke-width="1" stroke-dasharray="2,1"/>
</svg>