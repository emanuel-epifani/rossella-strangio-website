<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100" height="100"> 
    <!-- Cerchio esterno - più grande e in rosso per indicare restrizione --> 
    <circle cx="60" cy="60" r="48" fill="white" stroke="#E98074" stroke-width="4"/> 
    
    <!-- Numero 0 - riposizionato per centrare l'insieme --> 
    <ellipse cx="33" cy="55" rx="9" ry="13" fill="none" stroke="#4682B4" stroke-width="5" stroke-linecap="round"/>
    
    <!-- Simbolo "-" (trattino) - centrato --> 
    <path d="M48 55 L60 55" stroke="#4682B4" stroke-width="5" stroke-linecap="round"/>
    
    <!-- Numero 1 - riposizionato --> 
    <path d="M70 42 L70 68" stroke="#4682B4" stroke-width="5" stroke-linecap="round"/> 
    
    <!-- Numero 8 - riposizionato --> 
    <path d="M87 48 C87 40 77 40 77 48 C77 56 87 56 87 48" fill="none" stroke="#4682B4" stroke-width="5" stroke-linecap="round"/> 
    <path d="M87 62 C87 70 77 70 77 62 C77 54 87 54 87 62" fill="none" stroke="#4682B4" stroke-width="5" stroke-linecap="round"/> 
    
    <!-- Elementi decorativi di supporto --> 
    <circle cx="60" cy="60" r="54" fill="none" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="4,2"/>
</svg>