<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100" height="100" style="margin: 0 auto; display: block;">
    <!-- Cerchio diviso che rappresenta l'alternanza tra stati d'animo -->
    <circle cx="60" cy="60" r="50" fill="none" stroke="#4682B4" stroke-width="3"/>
    
    <!-- Metà in alto: stato maniacale/euforico (illuminato) -->
    <path d="M60 10 A50 50 0 0 1 110 60 A50 50 0 0 1 60 110" fill="none" stroke="#4682B4" stroke-width="1.5"/>
    <path d="M10 60 A50 50 0 0 1 60 10" fill="none" stroke="#E98074" stroke-width="1.5"/>
    <path d="M60 110 A50 50 0 0 1 10 60" fill="none" stroke="#E98074" stroke-width="1.5"/>
    
    <!-- Linea divisoria -->
    <line x1="10" y1="60" x2="110" y2="60" stroke="#4682B4" stroke-width="2"/>
    
    <!-- Volto euforico nella parte superiore -->
    <circle cx="60" cy="35" r="15" fill="white" stroke="#E98074" stroke-width="2"/>
    <circle cx="54" cy="32" r="2" fill="#E98074"/> <!-- Occhio sx -->
    <circle cx="66" cy="32" r="2" fill="#E98074"/> <!-- Occhio dx -->
    <path d="M54 40 Q60 45 66 40" stroke="#E98074" stroke-width="2" fill="none"/> <!-- Sorriso -->
    
    <!-- Simboli di energia/attività elevata -->
    <path d="M85 25 L90 20 M85 20 L90 25" stroke="#E98074" stroke-width="2"/> <!-- Stella energia -->
    <path d="M30 25 L35 20 M30 20 L35 25" stroke="#E98074" stroke-width="2"/> <!-- Stella energia -->
    <path d="M40 15 L45 10 M40 10 L45 15" stroke="#E98074" stroke-width="2"/> <!-- Stella energia -->
    
    <!-- Volto depresso nella parte inferiore -->
    <circle cx="60" cy="85" r="15" fill="white" stroke="#4682B4" stroke-width="2"/>
    <path d="M54 82 L58 82" stroke="#4682B4" stroke-width="1.5"/> <!-- Occhio sx -->
    <path d="M62 82 L66 82" stroke="#4682B4" stroke-width="1.5"/> <!-- Occhio dx -->
    <path d="M54 90 Q60 85 66 90" stroke="#4682B4" stroke-width="2" fill="none"/> <!-- Bocca triste -->
    
    <!-- Simboli di energia bassa/inattività -->
    <path d="M80 90 L85 90" stroke="#4682B4" stroke-width="2"/> <!-- Trattino basso -->
    <path d="M35 90 L40 90" stroke="#4682B4" stroke-width="2"/> <!-- Trattino basso -->
    
    <!-- Onda sinusoidale che rappresenta il ciclo dell'umore -->
    <path d="M20 60 C30 30 50 30 60 60 C70 90 90 90 100 60" fill="none" stroke="#E98074" stroke-width="2" stroke-dasharray="2,1"/>
  </svg>