<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100" height="100" style="margin: 0 auto; display: block;">
    <!-- Contorni instabili che rappresentano l'instabilità emotiva -->
    <path d="M60 10 C30 10 10 30 10 60 C10 90 30 110 60 110 C90 110 110 90 110 60 C110 30 90 10 60 10" 
          fill="none" stroke="#4682B4" stroke-width="2" stroke-dasharray="6,2"/>
    
    <!-- Due volti che rappresentano l'oscillazione emotiva -->
    <!-- Volto felice (lato sinistro) -->
    <circle cx="40" cy="50" r="20" fill="white" stroke="#4682B4" stroke-width="2"/>
    <circle cx="33" cy="45" r="3" fill="#4682B4"/> <!-- Occhio sx -->
    <circle cx="47" cy="45" r="3" fill="#4682B4"/> <!-- Occhio dx -->
    <path d="M33 55 Q40 60 47 55" stroke="#4682B4" stroke-width="2" fill="none"/> <!-- Sorriso -->
    
    <!-- Volto arrabbiato/triste (lato destro) -->
    <circle cx="80" cy="50" r="20" fill="white" stroke="#E98074" stroke-width="2"/>
    <path d="M73 42 L77 46" stroke="#E98074" stroke-width="2"/> <!-- Occhio sx arrabbiato -->
    <path d="M73 46 L77 42" stroke="#E98074" stroke-width="2"/>
    <path d="M83 42 L87 46" stroke="#E98074" stroke-width="2"/> <!-- Occhio dx arrabbiato -->
    <path d="M83 46 L87 42" stroke="#E98074" stroke-width="2"/>
    <path d="M73 55 Q80 52 87 55" stroke="#E98074" stroke-width="2" fill="none"/> <!-- Bocca triste -->
    
    <!-- Linea divisoria tra i due stati emotivi -->
    <line x1="60" y1="20" x2="60" y2="80" stroke="#4682B4" stroke-width="2" stroke-dasharray="5,3"/>
    
    <!-- Simbolo di relazioni instabili -->
    <circle cx="40" cy="90" r="8" fill="none" stroke="#4682B4" stroke-width="1.5"/>
    <circle cx="60" cy="90" r="8" fill="none" stroke="#4682B4" stroke-width="1.5"/>
    <circle cx="80" cy="90" r="8" fill="none" stroke="#4682B4" stroke-width="1.5"/>
    <path d="M48 90 L52 90" stroke="#4682B4" stroke-width="1"/>
    <path d="M68 90 L72 90" stroke="#4682B4" stroke-width="1"/>
    <path d="M36 90 L44 90" stroke="#E98074" stroke-width="2"/>
    <path d="M76 90 L84 90" stroke="#E98074" stroke-width="2" stroke-dasharray="2,1"/>
    
    <!-- Onde che rappresentano l'intensità emotiva -->
    <path d="M15 30 C20 20 25 25 30 30 C35 35 40 30 45 25" stroke="#E98074" stroke-width="1.5" fill="none"/>
    <path d="M95 25 C100 30 105 25 110 30" stroke="#E98074" stroke-width="1.5" fill="none"/>
  </svg>