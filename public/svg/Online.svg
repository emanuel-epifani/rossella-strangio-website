<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150" width="200" height="150">
    <!-- Sfondo -->
    <rect width="200" height="150" fill="#f2f2f2" rx="5" ry="5"/>
  
    <!-- Superficie tavolo/scrivania -->
    <rect x="20" y="110" width="160" height="40" fill="#D6C6B8" stroke="#4682B4" stroke-width="1"/>
  
    <!-- Laptop - base -->
    <path d="M55 110 L145 110 L155 130 L45 130 Z" fill="#A0A0A0" stroke="#4682B4" stroke-width="1.5"/>
  
    <!-- Touchpad -->
    <rect x="85" y="115" width="30" height="20" rx="2" ry="2" fill="#CCCCCC" stroke="#4682B4" stroke-width="0.8"/>
  
    <!-- Tastiera stilizzata -->
    <rect x="60" y="115" width="20" height="3" rx="1" ry="1" fill="#DDDDDD" stroke="#4682B4" stroke-width="0.3"/>
    <rect x="60" y="120" width="20" height="3" rx="1" ry="1" fill="#DDDDDD" stroke="#4682B4" stroke-width="0.3"/>
    <rect x="60" y="125" width="20" height="3" rx="1" ry="1" fill="#DDDDDD" stroke="#4682B4" stroke-width="0.3"/>
  
    <rect x="120" y="115" width="20" height="3" rx="1" ry="1" fill="#DDDDDD" stroke="#4682B4" stroke-width="0.3"/>
    <rect x="120" y="120" width="20" height="3" rx="1" ry="1" fill="#DDDDDD" stroke="#4682B4" stroke-width="0.3"/>
    <rect x="120" y="125" width="20" height="3" rx="1" ry="1" fill="#DDDDDD" stroke="#4682B4" stroke-width="0.3"/>
  
    <!-- Laptop - schermo -->
    <rect x="55" y="50" width="90" height="60" rx="3" ry="3" fill="#404040" stroke="#4682B4" stroke-width="1.5"/>
    <rect x="60" y="55" width="80" height="50" fill="#E6F3FF" stroke="#4682B4" stroke-width="0.5"/>
  
    <!-- Connessione schermo-base -->
    <path d="M55 110 L55 109 C55 108, 55 108, 55 107 L55 105 L65 105 L145 105 L145 107 C145 108, 145 108, 145 109 L145 110" stroke="#4682B4" stroke-width="1" fill="none"/>
  
    <!-- Webcam -->
    <circle cx="100" cy="53" r="1.5" fill="#4682B4"/>
  
    <!-- Interfaccia di chat sullo schermo -->
    <!-- Cornice chat -->
    <rect x="65" y="60" width="70" height="40" fill="white" stroke="#4682B4" stroke-width="0.8"/>
  
    <!-- Intestazione chat -->
    <rect x="65" y="60" width="70" height="5" fill="#4682B4" stroke="#4682B4" stroke-width="0.5"/>
    <circle cx="68" cy="62.5" r="1" fill="#E98074"/>
    <circle cx="72" cy="62.5" r="1" fill="#FFFCE6"/>
    <circle cx="76" cy="62.5" r="1" fill="#A5BFDE"/>
  
    <!-- Profilo utente nella chat -->
    <circle cx="70" cy="70" r="2.5" fill="#E98074" stroke="#4682B4" stroke-width="0.3"/>
  
    <!-- Messaggio utente nella chat -->
    <rect x="75" y="68" width="40" height="4" rx="2" ry="2" fill="#E6F3FF" stroke="#4682B4" stroke-width="0.3"/>
  
    <!-- Profilo assistente nella chat -->
    <circle cx="70" cy="78" r="2.5" fill="#4682B4" stroke="#4682B4" stroke-width="0.3"/>
  
    <!-- Messaggio assistente nella chat -->
    <rect x="75" y="76" width="45" height="4" rx="2" ry="2" fill="#F0F0F0" stroke="#4682B4" stroke-width="0.3"/>
    <rect x="75" y="82" width="30" height="4" rx="2" ry="2" fill="#F0F0F0" stroke="#4682B4" stroke-width="0.3"/>
  
    <!-- Casella di input nella chat -->
    <rect x="65" y="90" width="70" height="5" rx="2" ry="2" fill="#FFFFFF" stroke="#4682B4" stroke-width="0.8"/>
    <circle cx="130" cy="92.5" r="1.5" fill="#E98074"/>
  
    <!-- Simboli di chat/comunicazione -->
    <!-- Bolle di chat che fuoriescono dallo schermo -->
    <path d="M40 70 C35 65, 25 65, 20 70 C15 75, 15 85, 20 90 L18 95 L25 93 C30 95, 40 95, 45 90 C50 85, 50 75, 45 70 Z" fill="white" stroke="#4682B4" stroke-width="1"/>
    <path d="M25 75 L34 75 M25 80 L39 80 M25 85 L37 85" stroke="#4682B4" stroke-width="0.8"/>
  
    <path d="M160 80 C165 75, 175 75, 180 80 C185 85, 185 95, 180 100 L182 105 L175 103 C170 105, 160 105, 155 100 C150 95, 150 85, 155 80 Z" fill="white" stroke="#E98074" stroke-width="1"/>
    <path d="M163 85 L172 85 M163 90 L177 90 M163 95 L175 95" stroke="#E98074" stroke-width="0.8"/>
  
    <!-- Simboli di connessione -->
    <path d="M150 40 C155 35, 160 35, 165 40" stroke="#E98074" stroke-width="1" fill="none"/>
    <path d="M145 45 C155 35, 160 35, 170 45" stroke="#E98074" stroke-width="0.8" fill="none"/>
  
    <path d="M140 50 C155 35, 160 35, 175 50" stroke="#E98074" stroke-width="0.6" fill="none"/>
  
    <!-- Simbolo di comunicazione veloce/digitazione -->
    <path d="M85 140 L95 140 M85 145 L90 145" stroke="#4682B4" stroke-width="1">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" />
    </path>

    <!-- Simbolo di illuminazione/idea -->
    <circle cx="30" cy="30" r="5" fill="#FFFCE6" stroke="#E98074" stroke-width="0.8"/>
    <path d="M30 25 L30 23 M35 30 L37 30 M30 35 L30 37 M25 30 L23 30" stroke="#E98074" stroke-width="0.8"/>

    <!-- Simbolo cuore (emoticon) -->
    <path d="M170 30 C165 25, 160 30, 165 35 C170 40, 175 35, 170 30 Z" fill="#E98074" stroke="#E98074" stroke-width="0.5"/>

    <!-- Simbolo sorriso (emoticon) -->
    <circle cx="170" cy="50" r="5" fill="#FFFCE6" stroke="#4682B4" stroke-width="0.8"/>
    <path d="M167 50 C168 52, 172 52, 173 50" stroke="#4682B4" stroke-width="0.8" fill="none"/>
    <circle cx="168" cy="48" r="0.5" fill="#4682B4"/>
    <circle cx="172" cy="48" r="0.5" fill="#4682B4"/>

    <!-- Tazza di caffè accanto al laptop -->
    <path d="M30 100 L45 100 L43 120 L32 120 Z" fill="#FFFFFF" stroke="#4682B4" stroke-width="1"/>
    <path d="M45 105 L48 105 L48 110 L45 110" stroke="#4682B4" stroke-width="1" fill="none"/>
    <path d="M35 95 C37 92, 43 92, 45 95" stroke="#E98074" stroke-width="0.8" fill="#E98074"/>
</svg>